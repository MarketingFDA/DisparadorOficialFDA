databases:
  - name: disparador-fradema-db
    plan: free
    databaseName: disparador
    user: disparador

services:
  - type: web
    name: disparador-fradema-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: disparador-fradema-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://marketingfda.github.io
      - key: META_API_VERSION
        value: v20.0
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
    healthCheckPath: /campaigns
