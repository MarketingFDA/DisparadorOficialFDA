<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relatório da campanha — Disparador Fradema</title>
<link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
<div class="bg-blobs" aria-hidden="true">
  <span class="blob blob-1"></span>
  <span class="blob blob-2"></span>
  <span class="blob blob-3"></span>
</div>

<header class="topbar glass">
  <div class="brand">
    <span class="brand-dot"></span>
    <span>Disparador Fradema</span>
  </div>
  <nav class="tabs">
    <a class="tab active" href="index.html">Campanhas</a>
    <a class="tab" href="campanha.html">Nova campanha</a>
    <a class="tab" href="numeros.html">Números</a>
  </nav>
</header>

<main class="page">
  <section class="panel glass">
    <div class="panel-header">
      <div>
        <h1 id="detalhe-nome">Carregando…</h1>
        <p id="detalhe-sub" class="field-hint" style="margin-top:6px;"></p>
      </div>
      <div class="panel-actions">
        <a href="index.html" class="btn btn-ghost">← Voltar</a>
      </div>
    </div>

    <div class="filter-pills" id="status-filters">
      <button class="filter-pill active" data-status="">Todos</button>
      <button class="filter-pill" data-status="PENDING">Pendente</button>
      <button class="filter-pill" data-status="SENT">Enviado</button>
      <button class="filter-pill" data-status="DELIVERED">Entregue</button>
      <button class="filter-pill" data-status="READ">Lido</button>
      <button class="filter-pill" data-status="FAILED">Erro</button>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Contato</th>
            <th>Telefone</th>
            <th>Status</th>
            <th>Atualizado em</th>
            <th>Erro</th>
          </tr>
        </thead>
        <tbody id="messages-tbody">
          <tr><td colspan="5" class="empty-state">Carregando…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <span id="pagination-info"></span>
      <button id="prev-page" type="button">‹ Anterior</button>
      <button id="next-page" type="button">Próxima ›</button>
    </div>
  </section>
</main>

<div class="toast-stack" id="toast-stack"></div>

<script src="assets/js/api.js"></script>
<script src="assets/js/campanha-detalhe.js"></script>
</body>
</html>
